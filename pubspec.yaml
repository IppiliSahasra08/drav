name: dravidian_learn
description: Tamil and Telugu language learning app with ITS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Supabase Flutter SDK — handles auth + database
  supabase_flutter: ^2.5.6
  # HTTP client for FastAPI backend calls
  http: ^1.2.0
  # Persistent key-value store (stores backend URL, etc.)
  flutter_dotenv: ^5.1.0
  # Clean state management — simpler than Redux/Bloc for MVP
  provider: ^6.1.2
  shared_preferences: ^2.5.5
  flutter_tts: ^3.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/data/tamil.json
    - assets/data/telugu.json
    - assets/data/telugu_vowels.json
    - assets/data/telugu_greetings.json
